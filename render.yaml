services:
  - type: web
    name: mutual-fund-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn phase5_ui.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
